name: QuteFuzz CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Ensure your external/tket submodule is pulled
          fetch-depth: 0         # Downloads all history and tags for setuptools_scm

      - name: Run Setup Script
        run: |
          python3 -m scripts.setup

      - name: Formatting
        run: |
          # Check for linting errors
          uv run ruff check .
          # Check for formatting issues (optional, remove if you don't enforce formatting)
          uv run ruff format --check .
          # Run static type checking
          uv run pyright

      - name: Run CI Pipeline
        run: uv run -m scripts.run --num-tests 10
